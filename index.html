  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:        #0d0d12;
      --surface:   #18181f;
      --surface2:  #222230;
      --accent:    #e50914;
      --accent2:   #ff5733;
      --text:      #efeffa;
      --muted:     #7f7f9a;
      --border:    #2a2a3a;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .header {
      padding: 18px 28px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo { font-size: 20px; font-weight: 800; color: var(--accent); letter-spacing: -0.5px; }
    .logo span { color: var(--text); }
    .logo-sub { font-size: 12px; color: var(--muted); margin-left: 4px; letter-spacing: 0.3px; }

    /* ── Main ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px 60px;
      max-width: 680px;
      margin: 0 auto;
      width: 100%;
    }

    /* ── Welcome ── */
    .welcome { text-align: center; }
    .welcome-icon { font-size: 64px; margin-bottom: 24px; }
    .welcome h1 { font-size: 34px; font-weight: 800; line-height: 1.2; margin-bottom: 14px; }
    .welcome p  { color: var(--muted); font-size: 16px; line-height: 1.65; margin-bottom: 36px; max-width: 440px; margin-left: auto; margin-right: auto; }
    .pill-row { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 32px; }
    .pill { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; font-size: 13px; color: var(--muted); padding: 5px 13px; }

    /* ── Buttons ── */
    .btn-start {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 15px 44px;
      font-size: 17px;
      font-weight: 700;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.15s, background 0.15s;
    }
    .btn-start:hover  { background: #f10c18; transform: scale(1.03); }
    .btn-start:active { transform: scale(0.97); }

    .btn-next {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 12px 28px;
      font-size: 15px;
      font-weight: 700;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.15s;
      opacity: .35;
      pointer-events: none;
    }
    .btn-next.on  { opacity: 1; pointer-events: all; }
    .btn-next.on:hover { background: #f10c18; transform: scale(1.02); }

    .btn-back {
      background: transparent;
      color: var(--muted);
      border: 2px solid var(--border);
      padding: 11px 22px;
      font-size: 15px;
      font-weight: 600;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-back:hover { border-color: var(--muted); color: var(--text); }

    .btn-restart {
      background: transparent;
      color: var(--muted);
      border: 2px solid var(--border);
      padding: 11px 26px;
      font-size: 14px;
      font-weight: 600;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.15s;
      margin-top: 32px;
    }
    .btn-restart:hover { border-color: var(--text); color: var(--text); }

    /* ── Progress ── */
    .progress-wrap { width: 100%; margin-bottom: 38px; }
    .progress-meta { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 8px; }
    .progress-track { width: 100%; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .progress-fill  { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 2px; transition: width .4s ease; }

    /* ── Question ── */
    .q-card { width: 100%; animation: fadeup .3s ease; }
    @keyframes fadeup {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0);    }
    }
    .q-label { font-size: 11px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 10px; }
    .q-text  { font-size: 23px; font-weight: 700; line-height: 1.3; margin-bottom: 26px; }

    .options { display: flex; flex-direction: column; gap: 10px; }
    .opt {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 14px 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: all .15s;
    }
    .opt:hover            { border-color: #5a5a7a; background: var(--surface2); }
    .opt.sel              { border-color: var(--accent); background: rgba(229,9,20,.1); }
    .opt-icon             { font-size: 22px; flex-shrink: 0; width: 30px; text-align: center; }
    .opt-body             { }
    .opt-main             { font-size: 15px; font-weight: 600; }
    .opt-sub              { font-size: 13px; color: var(--muted); margin-top: 2px; }

    .q-nav { display: flex; gap: 10px; margin-top: 26px; justify-content: flex-end; }

    /* ── Results ── */
    .res-header { text-align: center; margin-bottom: 36px; }
    .res-header h2 { font-size: 26px; font-weight: 800; margin-bottom: 6px; }
    .res-header p  { color: var(--muted); font-size: 14px; }

    .film-list { width: 100%; display: flex; flex-direction: column; gap: 14px; }

    .film-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px 20px;
      display: flex;
      gap: 14px;
      align-items: flex-start;
      animation: fadeup .4s ease;
      transition: border-color .2s;
    }
    .film-card.gold { border-color: var(--accent); background: linear-gradient(135deg, rgba(229,9,20,.06), var(--surface)); }

    .rank { font-size: 22px; font-weight: 800; color: var(--muted); min-width: 32px; text-align: center; padding-top: 2px; line-height: 1; }
    .film-card.gold .rank { color: var(--accent); }

    .film-info { flex: 1; min-width: 0; }
    .film-title { font-size: 17px; font-weight: 700; margin-bottom: 3px; }
    .film-meta  { font-size: 12px; color: var(--muted); margin-bottom: 8px; }

    .tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 9px; }
    .tag  { background: var(--surface2); color: var(--muted); font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px; text-transform: uppercase; letter-spacing: .5px; }

    .film-desc { font-size: 13px; color: var(--muted); line-height: 1.55; margin-bottom: 12px; }

    .match-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .match-lbl  { font-size: 11px; color: var(--muted); white-space: nowrap; }
    .match-track { flex: 1; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .match-bar   { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 3px; width: 0%; transition: width 1s ease .2s; }
    .match-pct  { font-size: 13px; font-weight: 700; min-width: 34px; text-align: right; }

    .nf-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      font-size: 12px;
      font-weight: 700;
      padding: 6px 14px;
      border-radius: 7px;
      transition: background .15s;
    }
    .nf-btn:hover { background: #f10c18; }

    .res-footer { display: flex; justify-content: center; padding-bottom: 40px; }

    /* Disclaimer */
    .disclaimer { font-size: 11px; color: #555570; text-align: center; margin-top: 20px; line-height: 1.5; }

    @media (max-width: 480px) {
      .q-text  { font-size: 19px; }
      .welcome h1 { font-size: 26px; }
    }
  </style>
</head>

        s: { murder_mystery:3, dont_look_up:2, adam_project:2, glass_onion:2, bullet_train:3, knives_out:2, the_mitchells:3, Klaus:3, set_it_up:3, to_all_the_boys:3, enola_holmes:2, tick_boom_2:2, the_half_of_it:2 } }
    ]
  }
];

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let step = -1;       // -1 = welcome
let answers = {};    // { questionId: optionIndex }

// ─────────────────────────────────────────────
// RENDER HELPERS
// ─────────────────────────────────────────────
const app = document.getElementById('app');

function renderWelcome() {
  step = -1;
  app.innerHTML = `
    <div class="welcome">
      <div class="welcome-icon">🎬</div>
      <h1>Welke film kijk je vanavond?</h1>
      <p>Beantwoord ${QUESTIONS.length} vragen over je stemming, gezelschap en smaak — en ontdek welke Netflix-films perfect bij jouw avond passen.</p>
      <div class="pill-row">
        <span class="pill">🎭 ${QUESTIONS.length} vragen</span>
        <span class="pill">🎬 ${FILMS.length} films</span>
        <span class="pill">📺 Netflix NL</span>
        <span class="pill">⏱️ ~2 minuten</span>
      </div>
      <button class="btn-start" onclick="go(0)">Start de quiz →</button>
    </div>
  `;
}

function renderQuestion(idx) {
  step = idx;
  const q = QUESTIONS[idx];
  const pct = (idx / QUESTIONS.length) * 100;
  const sel = answers[q.id];
  const isLast = idx === QUESTIONS.length - 1;

  app.innerHTML = `
    <div class="progress-wrap">
      <div class="progress-meta">
        <span>Vraag ${idx + 1} van ${QUESTIONS.length}</span>
        <span>${Math.round(pct)}% klaar</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" style="width:${pct}%"></div>
      </div>
    </div>
    <div class="q-card">
      <div class="q-label">Vraag ${idx + 1}</div>
      <div class="q-text">${q.text}</div>
      <div class="options">
        ${q.opts.map((o, i) => `
          <div class="opt ${sel === i ? 'sel' : ''}" onclick="pick(${i})">
            <div class="opt-icon">${o.icon}</div>
            <div class="opt-body">
              <div class="opt-main">${o.main}</div>
              ${o.sub ? `<div class="opt-sub">${o.sub}</div>` : ''}
            </div>
          </div>
        `).join('')}
      </div>
      <div class="q-nav">
        ${idx > 0 ? `<button class="btn-back" onclick="go(${idx - 1})">← Terug</button>` : ''}
        <button class="btn-next ${sel !== undefined ? 'on' : ''}" id="nextBtn" onclick="next()">
          ${isLast ? 'Bekijk mijn films 🎬' : 'Volgende →'}
        </button>
      </div>
    </div>
  `;
}

function renderResults() {
  // tally scores
  const totals = {};
  FILMS.forEach(f => totals[f.id] = 0);

  QUESTIONS.forEach(q => {
    const idx = answers[q.id];
    if (idx === undefined) return;
    Object.entries(q.opts[idx].s).forEach(([id, pts]) => {
      if (totals[id] !== undefined) totals[id] += pts;
    });
  });

  const sorted = FILMS
    .map(f => ({ ...f, pts: totals[f.id] }))
    .sort((a, b) => b.pts - a.pts)
    .slice(0, 8);

  const topPts = sorted[0].pts || 1;

  app.innerHTML = `
    <div class="res-header">
      <h2>🎬 Jouw filmtips van vanavond</h2>
      <p>Gesorteerd op hoe goed ze passen bij je antwoorden</p>
    </div>
    <div class="film-list">
      ${sorted.map((f, i) => {
        const pct = Math.max(10, Math.round((f.pts / topPts) * 100));
        return `
          <div class="film-card ${i === 0 ? 'gold' : ''}">
            <div class="rank">${i === 0 ? '🥇' : '#' + (i + 1)}</div>
            <div class="film-info">
              <div class="film-title">${f.title}</div>
              <div class="film-meta">${f.year} &middot; ${f.runtime}</div>
              <div class="tags">${f.genres.map(g => `<span class="tag">${g}</span>`).join('')}</div>
              <div class="film-desc">${f.desc}</div>
              <div class="match-row">
                <span class="match-lbl">Match</span>
                <div class="match-track">
                  <div class="match-bar" data-pct="${pct}"></div>
                </div>
                <span class="match-pct">${pct}%</span>
              </div>
              <a href="${f.url}" target="_blank" rel="noopener" class="nf-btn">▶ Bekijk op Netflix</a>
            </div>
          </div>
        `;
      }).join('')}
    </div>
    <div class="disclaimer">
      Beschikbaarheid kan variëren. Controleer altijd of de film nog op Netflix NL staat.
    </div>
    <div class="res-footer">
      <button class="btn-restart" onclick="renderWelcome()">↺ Opnieuw beginnen</button>
    </div>
  `;

  // animate bars after paint
  requestAnimationFrame(() => {
    setTimeout(() => {
      document.querySelectorAll('.match-bar[data-pct]').forEach(el => {
        el.style.width = el.dataset.pct + '%';
      });
    }, 80);
  });
}

// ─────────────────────────────────────────────
// ACTIONS
// ─────────────────────────────────────────────
function go(idx) {
  if (idx < 0) { renderWelcome(); return; }
  renderQuestion(idx);
}

function pick(i) {
  const q = QUESTIONS[step];
  answers[q.id] = i;
  document.querySelectorAll('.opt').forEach((el, j) => el.classList.toggle('sel', j === i));
  const btn = document.getElementById('nextBtn');
  if (btn) btn.classList.add('on');
}

function next() {
  const q = QUESTIONS[step];
  if (answers[q.id] === undefined) return;
  if (step < QUESTIONS.length - 1) {
    go(step + 1);
  } else {
    renderResults();
  }
}

// ─────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────
renderWelcome();
</script>
</body>
</html>
